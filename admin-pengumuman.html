<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Kelola Pengumuman - Admin RT 04</title>
  <link rel="stylesheet" href="assets/css/admin.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="admin-body">
<aside class="admin-sidebar">
  <div class="sidebar-logo"><img src="assets/img/logo-rt.svg" alt="Logo"/><span>Admin RT 04<span class="sl-sub">RW 02 · Jombang Ciputat</span></span></div>
  <nav class="sidebar-nav">
    <div class="sidebar-section">Menu Utama</div>
    <a href="admin-dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a>
    <div class="sidebar-section">Kelola Konten</div>
    <a href="admin-pengumuman.html" class="active"><i class="fas fa-bullhorn"></i> Pengumuman</a>
    <a href="admin-iuran.html"><i class="fas fa-money-bill-wave"></i> Iuran Warga</a>
    <a href="admin-umkm.html"><i class="fas fa-store"></i> UMKM</a>
    <a href="admin-kegiatan.html"><i class="fas fa-calendar-days"></i> Kegiatan</a>
    <a href="admin-ronda.html"><i class="fas fa-moon"></i> Jadwal Ronda</a>
    <a href="admin-laporan.html"><i class="fas fa-triangle-exclamation"></i> Laporan</a>
  </nav>
  <div class="sidebar-footer"><a href="index.html" target="_blank"><i class="fas fa-globe"></i> Lihat Website</a></div>
</aside>
<div class="admin-main">
  <div class="admin-topbar">
    <div class="topbar-title"><i class="fas fa-bullhorn"></i> Kelola Pengumuman</div>
    <div class="topbar-right">
      <span class="admin-badge"><i class="fas fa-user-shield"></i> <span id="adminUsername">admin</span></span>
      <button class="logout-btn" onclick="doLogout()"><i class="fas fa-right-from-bracket"></i> Keluar</button>
    </div>
  </div>
  <div class="admin-content">
    <div class="crud-toolbar">
      <h2>Daftar Pengumuman</h2>
      <div style="display:flex;gap:.75rem;flex-wrap:wrap">
        <input type="text" id="searchPengumuman" class="crud-search" placeholder="Cari pengumuman..."/>
        <button class="btn-add" onclick="openAddPengumuman()"><i class="fas fa-plus"></i> Tambah</button>
      </div>
    </div>
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead><tr><th>No</th><th>Judul</th><th>Kategori</th><th>Tanggal</th><th>Aksi</th></tr></thead>
        <tbody id="tbodyPengumuman"><tr class="empty-row"><td colspan="5">Memuat data...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL TAMBAH/EDIT -->
<div class="modal-overlay" id="modalPengumuman">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalPengumumanTitle">Tambah Pengumuman</h3>
      <button class="modal-close" onclick="closeModal('modalPengumuman')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="pngId"/>
      <div class="form-group"><label>Judul Pengumuman *</label><input type="text" id="pngJudul" placeholder="Masukkan judul pengumuman"/></div>
      <div class="form-group"><label>Isi Pengumuman *</label><textarea id="pngIsi" rows="4" placeholder="Tulis isi pengumuman..."></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Kategori</label>
          <select id="pngKategori"><option>Info</option><option>Penting</option><option>Kegiatan</option><option>Spesial</option></select>
        </div>
        <div class="form-group"><label>Tanggal</label><input type="date" id="pngTanggal"/></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal('modalPengumuman')">Batal</button>
      <button class="btn-save" onclick="savePengumuman()"><i class="fas fa-floppy-disk"></i> Simpan</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <i class="fas fa-triangle-exclamation"></i>
    <h3>Konfirmasi Hapus</h3>
    <p>Yakin ingin menghapus <span id="confirmLabel"></span>?</p>
    <button class="btn-cancel" onclick="confirmNo()">Batal</button>
    <button class="btn-del" onclick="confirmYes()">Ya, Hapus</button>
  </div>
</div>
<script src="assets/js/admin.js"></script>
</body></html>
