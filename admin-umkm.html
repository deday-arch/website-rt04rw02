<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg"/>
  <title>Kelola UMKM - Admin RT 04</title>
  <link rel="stylesheet" href="assets/css/admin.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="admin-body">
<aside class="admin-sidebar">
  <div class="sidebar-logo"><img src="assets/img/logo-rt.png" alt="Logo"/><img src="assets/img/logo-tangsel.png" alt="Logo Tangsel" style="height:32px;width:auto;"/><span>Admin RT 04<span class="sl-sub">RW 02 · Jombang Ciputat</span></span></div>
  <nav class="sidebar-nav">
    <div class="sidebar-section">Menu Utama</div>
    <a href="admin-dashboard.html"><i class="fas fa-gauge"></i> Dashboard</a>
    <div class="sidebar-section">Kelola Konten</div>
    <a href="admin-pengumuman.html"><i class="fas fa-bullhorn"></i> Pengumuman</a>
    <a href="admin-iuran.html"><i class="fas fa-money-bill-wave"></i> Iuran Warga</a>
    <a href="admin-umkm.html" class="active"><i class="fas fa-store"></i> UMKM</a>
    <a href="admin-kegiatan.html"><i class="fas fa-calendar-days"></i> Kegiatan</a>
    <a href="admin-ronda.html"><i class="fas fa-moon"></i> Jadwal Ronda</a>
    <a href="admin-laporan.html"><i class="fas fa-triangle-exclamation"></i> Laporan</a>
  </nav>
  <div class="sidebar-footer"><a href="index.html" target="_blank"><i class="fas fa-globe"></i> Lihat Website</a></div>
</aside>
<div class="admin-main">
  <div class="admin-topbar">
    <div class="topbar-title"><i class="fas fa-store"></i> Kelola UMKM</div>
    <div class="topbar-right">
      <span class="admin-badge"><i class="fas fa-user-shield"></i> <span id="adminUsername">admin</span></span>
      <button class="logout-btn" onclick="doLogout()"><i class="fas fa-right-from-bracket"></i> Keluar</button>
    </div>
  </div>
  <div class="admin-content">
    <div class="crud-toolbar">
      <h2>Daftar UMKM</h2>
      <div style="display:flex;gap:.75rem;flex-wrap:wrap">
        <input type="text" id="searchUmkm" class="crud-search" placeholder="Cari nama / pemilik / kategori..."/>
        <button class="btn-add" onclick="openAddUmkm()"><i class="fas fa-plus"></i> Tambah UMKM</button>
      </div>
    </div>
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead><tr><th>No</th><th>Nama Usaha / Pemilik</th><th>No.Rumah</th><th>Kategori</th><th>Kontak</th><th>Aksi</th></tr></thead>
        <tbody id="tbodyUmkm"><tr class="empty-row"><td colspan="6">Memuat data...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalUmkm">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalUmkmTitle">Tambah UMKM</h3>
      <button class="modal-close" onclick="closeModal('modalUmkm')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="umkmId"/>
      <input type="hidden" id="umkmGambarData"/>
      <div class="form-row">
        <div class="form-group"><label>Nama Usaha *</label><input type="text" id="umkmNama" placeholder="Nama usaha"/></div>
        <div class="form-group"><label>Pemilik *</label><input type="text" id="umkmPemilik" placeholder="Nama pemilik"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>No. Rumah</label><input type="text" id="umkmNoRumah" placeholder="No. xx"/></div>
        <div class="form-group"><label>Kategori</label>
          <select id="umkmKategori">
            <option>Makanan & Minuman</option><option>Sembako</option>
            <option>Jasa</option><option>Kerajinan</option><option>Fashion</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Deskripsi Usaha</label><textarea id="umkmDeskripsi" rows="3" placeholder="Deskripsikan usaha..."></textarea></div>
      <div class="form-group"><label>Nomor Kontak / WhatsApp</label><input type="text" id="umkmKontak" placeholder="08xx-xxxx-xxxx"/></div>
      <div class="form-group">
        <label>Foto Produk / Toko</label>
        <input type="file" id="umkmGambarFile" accept="image/*" onchange="previewUmkmGambar(this)" style="display:block;margin-bottom:.5rem;"/>
        <div id="umkmGambarPreview" style="display:none;margin-top:.5rem;">
          <img id="umkmGambarImg" src="" alt="Preview" style="max-width:100%;max-height:180px;border-radius:8px;border:1px solid var(--border);object-fit:cover;"/>
          <button type="button" onclick="hapusUmkmGambar()" style="display:block;margin-top:.4rem;background:none;border:none;color:#ef4444;cursor:pointer;font-size:.85rem;"><i class="fas fa-trash"></i> Hapus foto</button>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal('modalUmkm')">Batal</button>
      <button class="btn-save" onclick="saveUmkm()"><i class="fas fa-floppy-disk"></i> Simpan</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <i class="fas fa-triangle-exclamation"></i><h3>Konfirmasi Hapus</h3>
    <p>Yakin ingin menghapus <span id="confirmLabel"></span>?</p>
    <button class="btn-cancel" onclick="confirmNo()">Batal</button>
    <button class="btn-del" onclick="confirmYes()">Ya, Hapus</button>
  </div>
</div>
<script src="assets/js/admin.js"></script>
</body></html>
